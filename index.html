<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: ./mi-obra-ar.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <img id="capa1" src="fondo.png">
        <img id="capa2" src="detalles_fondo.png">
        <img id="capa6" src="frente.png">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-image src="#capa1" position="0 0 -0.5" width="1" height="1"></a-image>
        
        <a-image src="#capa2" position="0 0 -0.3" width="1" height="1" transparent="true"></a-image>
        
        <a-image src="#capa6" position="0 0 0.1" width="1" height="1" transparent="true"></a-image>
        
      </a-entity>
    </a-scene>
  </body>
</html>
</html>
